name: RC Package Proof

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Package version to prove, for example 0.7.3-rc.2"
        required: true
        default: "0.7.3-rc.2"
        type: string
      target_sha:
        description: "Full app commit SHA to package. Defaults to the workflow ref commit."
        required: false
        default: ""
        type: string
      build_ref:
        description: "emulebb-build ref used by the reusable workspace command"
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: emulebb-rc-package-proof-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare package proof metadata
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout app source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate proof inputs
        id: meta
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          TARGET_SHA_INPUT: ${{ inputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta)\.[0-9]+)?$ ]]; then
            echo "Unsupported release version: ${RELEASE_VERSION}" >&2
            exit 1
          fi

          target_sha="${TARGET_SHA_INPUT:-${GITHUB_SHA}}"
          if [[ ! "${target_sha}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "target_sha must be empty or a full 40-character commit SHA." >&2
            exit 1
          fi
          target_sha="${target_sha,,}"

          if ! git cat-file -e "${target_sha}^{commit}" 2>/dev/null; then
            git fetch origin "${target_sha}"
          fi
          git cat-file -e "${target_sha}^{commit}"

          {
            echo "release_version=${RELEASE_VERSION}"
            echo "target_sha=${target_sha}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Prove package (${{ matrix.asset_arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            asset_arch: x64
          - platform: ARM64
            asset_arch: arm64
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      app_ref: ${{ needs.prepare.outputs.target_sha }}
      build_ref: ${{ inputs.build_ref }}
      runs_on: windows-2022
      timeout_minutes: 120
      artifact_name: emulebb-rc-package-proof-${{ needs.prepare.outputs.release_version }}-${{ matrix.asset_arch }}
      artifact_path: rc-package-proof-artifacts/*
      failure_artifact_name: emulebb-rc-package-proof-logs-${{ needs.prepare.outputs.release_version }}-${{ matrix.asset_arch }}
      failure_artifact_path: logs/builds/**
      command: |
        $packageVersion = "${{ needs.prepare.outputs.release_version }}"
        $assetArch = "${{ matrix.asset_arch }}"

        python -m emule_workspace package-release `
          --config Release `
          --platform "${{ matrix.platform }}" `
          --clean `
          --release-version $packageVersion

        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $releaseRoot = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "release\emulebb-v$packageVersion"
        $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "rc-package-proof-artifacts"
        New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null

        $requiredAssets = @(
          "emulebb-$packageVersion-$assetArch.zip",
          "emulebb-$packageVersion-$assetArch.manifest.json",
          "emulebb-$packageVersion-$assetArch.sbom.spdx.json",
          "emulebb-$packageVersion-diagnostics-$assetArch.zip",
          "emulebb-$packageVersion-diagnostics-$assetArch.manifest.json",
          "emulebb-$packageVersion-diagnostics-$assetArch.sbom.spdx.json"
        )

        if ($assetArch -eq "x64") {
          $requiredAssets += @(
            "Bootstrap-eMuleBBSuite.ps1",
            "Bootstrap-eMuleBBSuite.ps1.sha256"
          )
        }

        foreach ($asset in $requiredAssets) {
          $source = Join-Path $releaseRoot $asset
          if (-not (Test-Path -LiteralPath $source)) {
            throw "RC package proof asset not found: $source"
          }
          Copy-Item -LiteralPath $source -Destination $artifactRoot
        }

        foreach ($zipName in @("emulebb-$packageVersion-$assetArch.zip", "emulebb-$packageVersion-diagnostics-$assetArch.zip")) {
          $zipPath = Join-Path $releaseRoot $zipName
          $expectedExe = if ($zipName -like "*-diagnostics-*") { "eMuleBB/emulebb-diagnostics.exe" } else { "eMuleBB/emulebb.exe" }
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName })
            # preferences.ini is intentionally NOT packaged: the app generates a
            # default config on first run, so do not require it as a package entry.
            foreach ($requiredEntry in @($expectedExe)) {
              if ($entries -notcontains $requiredEntry) {
                throw "Missing required package entry in ${zipPath}: $requiredEntry"
              }
            }
          } finally {
            $archive.Dispose()
          }
        }

        Get-ChildItem $artifactRoot

  summary:
    name: Summarize package proof
    needs:
      - prepare
      - build
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write proof summary
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          {
            echo "# eMuleBB RC Package Proof"
            echo
            echo "Result: ${BUILD_RESULT}"
            echo "Package version: ${RELEASE_VERSION}"
            echo "Target commit: ${TARGET_SHA}"
            echo "Run: ${RUN_URL}"
            echo
            echo "Coverage:"
            echo "- Release x64 package and diagnostics package"
            echo "- Release ARM64 package and diagnostics package"
            echo "- ZIP, manifest, and SPDX SBOM asset presence"
            echo "- x64 suite bootstrapper asset presence"
            echo
            echo "No release, tag, attestation, nightly publish, soak, or live campaign is performed by this workflow."
          } | tee -a "${GITHUB_STEP_SUMMARY}"
