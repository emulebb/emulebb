name: Controlled Smoke

on:
  schedule:
    - cron: "47 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: emulebb-controlled-smoke
  cancel-in-progress: false

env:
  EMULEBB_NIGHTLY_BASE_VERSION: "0.7.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare smoke metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      release_date: ${{ steps.meta.outputs.release_date }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout app source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute smoke metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          release_date="$(date -u +%Y%m%d)"
          package_version="${EMULEBB_NIGHTLY_BASE_VERSION}-nightly.${release_date}.${short_sha}"

          {
            echo "package_version=${package_version}"
            echo "release_date=${release_date}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

  smoke:
    name: Package and smoke (x64, ${{ matrix.runner.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        runner:
          - label: windows-2022
            summary: Windows Server 2022 hosted runner with v143 ATL/MFC
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      app_ref: ${{ github.sha }}
      runs_on: ${{ matrix.runner.label }}
      node_version: "24"
      timeout_minutes: 90
      artifact_name: emulebb-controlled-smoke-${{ needs.prepare.outputs.package_version }}-${{ matrix.runner.label }}
      artifact_path: |
        release/emulebb-v${{ needs.prepare.outputs.package_version }}/**
        reports/live-e2e-suite/**
        artifacts/live-e2e-suite/**
        logs/builds/**
      failure_artifact_name: emulebb-controlled-smoke-failure-${{ needs.prepare.outputs.short_sha }}-${{ matrix.runner.label }}
      failure_artifact_path: |
        release/**
        reports/live-e2e-suite/**
        artifacts/live-e2e-suite/**
        logs/builds/**
      command: |
        function Ensure-MfcForHostedRunner {
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
            return
          }

          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            return
          }

          $vcToolsRoot = Join-Path $installPath "VC\Tools\MSVC"
          $v143Compiler = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter cl.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\bin\Hostx64\x64\cl.exe" } |
            Select-Object -First 1
          $v143StaticMfc = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter nafxcw.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\atlmfc\lib\x64\nafxcw.lib" } |
            Select-Object -First 1
          $v143Toolset = Get-ChildItem -LiteralPath (Join-Path $installPath "MSBuild\Microsoft\VC") -Recurse -Filter Toolset.props -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\PlatformToolsets\v143\Toolset.props" } |
            Select-Object -First 1
          $v143DynamicMfc = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter mfc140.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\atlmfc\lib\x64\mfc140.lib" } |
            Select-Object -First 1
          if ($v143Compiler -and $v143StaticMfc -and $v143DynamicMfc -and $v143Toolset) {
            Write-Host "Required v143 ATL/MFC components already available."
            Write-Host "v143 compiler: $($v143Compiler.FullName)"
            Write-Host "v143 static MFC: $($v143StaticMfc.FullName)"
            Write-Host "v143 dynamic MFC: $($v143DynamicMfc.FullName)"
            Write-Host "v143 toolset: $($v143Toolset.FullName)"
            return
          }

          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (-not (Test-Path -LiteralPath $installer)) {
            throw "ATL/MFC is missing and Visual Studio Installer was not found: $installer"
          }

          Write-Host "v143 ATL/MFC is missing on this hosted runner. Installing Visual Studio v143 components."
          & $installer modify `
            --installPath $installPath `
            --quiet `
            --norestart `
            --wait `
            --add Microsoft.VisualStudio.ComponentGroup.VC.Tools.143.x86.x64 `
            --add Microsoft.VisualStudio.Component.VC.14.44.17.14.x86.x64 `
            --add Microsoft.VisualStudio.Component.VC.14.44.17.14.ATL `
            --add Microsoft.VisualStudio.Component.VC.14.44.17.14.MFC
          if ($LASTEXITCODE -ne 0) {
            throw "Visual Studio Installer failed while adding v143 ATL/MFC components: exit $LASTEXITCODE"
          }

          $postInstallCompiler = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter cl.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\bin\Hostx64\x64\cl.exe" } |
            Select-Object -First 1
          $postInstallStaticMfc = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter nafxcw.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\atlmfc\lib\x64\nafxcw.lib" } |
            Select-Object -First 1
          $postInstallDynamicMfc = Get-ChildItem -LiteralPath $vcToolsRoot -Recurse -Filter mfc140.lib -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\14.44.*\atlmfc\lib\x64\mfc140.lib" } |
            Select-Object -First 1
          if (-not ($postInstallCompiler -and $postInstallStaticMfc -and $postInstallDynamicMfc)) {
            throw "Visual Studio Installer completed but v143 ATL/MFC files are still missing under $vcToolsRoot"
          }
        }

        Ensure-MfcForHostedRunner

        $packageVersion = "${{ needs.prepare.outputs.package_version }}"
        $ciLiveWireInputs = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "tmp\ci\live-wire-inputs.ci.json"
        $ciInstallRoot = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "tmp\ci-suite-install-root"
        New-Item -ItemType Directory -Force -Path (Split-Path -Parent $ciLiveWireInputs) | Out-Null
        $p2pBindInterface = (Get-NetAdapter |
          Where-Object { $_.Status -eq "Up" } |
          Select-Object -First 1 -ExpandProperty Name)
        if (-not $p2pBindInterface) {
          $p2pBindInterface = "Ethernet"
        }
        @{
          schema = "emulebb-build-tests.live-wire-inputs.v1"
          local_package_install = @{
            target_path = $ciInstallRoot
            p2p_bind_interface = $p2pBindInterface
            enable_rest = $true
            enable_crash_dumps = $true
          }
        } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $ciLiveWireInputs -Encoding utf8

        python -m emule_workspace package-release `
          --config Release `
          --platform x64 `
          --clean `
          --release-version $packageVersion

        python -m emule_workspace package-amutorrent `
          --config Release `
          --platform x64 `
          --clean `
          --release-version $packageVersion

        python -m emule_workspace build app `
          --config Release `
          --platform x64 `
          --variant tracing-harness

        python -m emule_workspace test live-e2e `
          --config Release `
          --platform x64 `
          --materialize-test-install `
          --materialize-test-install-release-version $packageVersion `
          --materialize-test-install-skip-build `
          --live-wire-inputs-file $ciLiveWireInputs `
          --suite command-line-smoke `
          --test-network offline `
          --fail-fast

        python -m emule_workspace test live-e2e `
          --config Release `
          --platform x64 `
          --materialize-test-install `
          --materialize-test-install-release-version $packageVersion `
          --materialize-test-install-skip-build `
          --live-wire-inputs-file $ciLiveWireInputs `
          --suite deterministic-two-client-transfer `
          --test-network lan `
          --fail-fast

  arm64_smoke:
    name: Package and smoke (ARM64, windows-11-arm)
    needs: prepare
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      app_ref: ${{ github.sha }}
      runs_on: windows-11-arm
      timeout_minutes: 90
      artifact_name: emulebb-controlled-smoke-arm64-${{ needs.prepare.outputs.package_version }}
      artifact_path: |
        release/emulebb-v${{ needs.prepare.outputs.package_version }}/**
        reports/command-line-smoke/**
        artifacts/command-line-smoke/**
        logs/builds/**
      failure_artifact_name: emulebb-controlled-smoke-arm64-failure-${{ needs.prepare.outputs.short_sha }}
      failure_artifact_path: |
        release/**
        reports/command-line-smoke/**
        artifacts/command-line-smoke/**
        logs/builds/**
      command: |
        $packageVersion = "${{ needs.prepare.outputs.package_version }}"

        python -m emule_workspace package-release `
          --config Release `
          --platform ARM64 `
          --clean `
          --release-version $packageVersion

        $releaseRoot = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "release\emulebb-v$packageVersion"
        $packageZip = Join-Path $releaseRoot "emulebb-$packageVersion-arm64.zip"
        $installRoot = Join-Path $env:EMULEBB_WORKSPACE_OUTPUT_ROOT "tmp\test-installs\controlled-smoke-arm64"
        if (Test-Path -LiteralPath $installRoot) {
          Remove-Item -LiteralPath $installRoot -Recurse -Force
        }
        New-Item -ItemType Directory -Path $installRoot -Force | Out-Null
        Expand-Archive -LiteralPath $packageZip -DestinationPath $installRoot -Force

        $appRoot = Join-Path $installRoot "eMuleBB"
        $appExe = Join-Path $appRoot "emulebb.exe"
        python $env:EMULEBB_WORKSPACE_ROOT\repos\emulebb-build-tests\scripts\command-line-smoke.py `
          --app-root $appRoot `
          --app-exe $appExe `
          --configuration Release

  report:
    name: Report controlled smoke status
    needs:
      - prepare
      - smoke
      - arm64_smoke
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Write smoke summary
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          X64_SMOKE_RESULT: ${{ needs.smoke.result }}
          ARM64_SMOKE_RESULT: ${{ needs.arm64_smoke.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          smoke_result="success"
          if [[ "${X64_SMOKE_RESULT}" != "success" || "${ARM64_SMOKE_RESULT}" != "success" ]]; then
            smoke_result="x64=${X64_SMOKE_RESULT}, arm64=${ARM64_SMOKE_RESULT}"
          fi
          cat > controlled-smoke-summary.md <<EOF
          # eMuleBB Controlled Smoke

          Result: ${smoke_result}
          x64 result: ${X64_SMOKE_RESULT}
          ARM64 result: ${ARM64_SMOKE_RESULT}
          Package version: ${PACKAGE_VERSION}
          Commit: ${GITHUB_SHA}
          Short SHA: ${SHORT_SHA}
          Run: ${RUN_URL}

          Coverage:
          - Hosted runner: windows-2022 with v143 ATL/MFC policy
          - Release x64 eMuleBB package
          - Release x64 aMuTorrent package
          - Release x64 tracing harness build
          - Offline command-line smoke
          - LAN deterministic two-client transfer
          - Hosted runner: windows-11-arm
          - Release ARM64 eMuleBB package
          - ARM64 offline command-line smoke
          EOF
          cat controlled-smoke-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload smoke summary
        uses: actions/upload-artifact@v5
        with:
          name: emulebb-controlled-smoke-summary-${{ needs.prepare.outputs.short_sha }}
          path: controlled-smoke-summary.md
          retention-days: 30

      - name: Update smoke failure issue
        uses: actions/github-script@v8
        env:
          X64_SMOKE_RESULT: ${{ needs.smoke.result }}
          ARM64_SMOKE_RESULT: ${{ needs.arm64_smoke.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
        with:
          script: |
            const title = "[CI] Controlled Smoke failure";
            const { owner, repo } = context.repo;
            const issueList = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issueList.data.find((issue) => issue.title === title);
            const x64Result = process.env.X64_SMOKE_RESULT;
            const arm64Result = process.env.ARM64_SMOKE_RESULT;
            const result = x64Result === "success" && arm64Result === "success"
              ? "success"
              : `x64=${x64Result}, arm64=${arm64Result}`;
            const runUrl = process.env.RUN_URL;
            const packageVersion = process.env.PACKAGE_VERSION;

            if (result === "success") {
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Controlled Smoke recovered on ${context.sha}.\n\nRun: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  state: "closed",
                });
              }
              return;
            }

            const body = [
              "Controlled Smoke failed or did not complete.",
              "",
              `Result: ${result}`,
              `Commit: ${context.sha}`,
              `Package version: ${packageVersion}`,
              `Run: ${runUrl}`,
              "",
              "This workflow covers x64 package-release, package-amutorrent, tracing-harness build, offline command-line smoke, and LAN deterministic two-client transfer on the Windows 2022 hosted runner with the v143 ATL/MFC policy. It also covers ARM64 package-release and offline command-line smoke on the windows-11-arm hosted runner.",
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }
