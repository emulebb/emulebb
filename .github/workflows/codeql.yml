name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codeql.yml"
      - "srchybrid/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/codeql.yml"
      - "srchybrid/**"
  schedule:
    - cron: "29 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: emulebb-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout app source
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
