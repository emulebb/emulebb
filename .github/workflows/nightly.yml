name: Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Publish even when this commit already has a nightly release"
        required: false
        default: false
        type: boolean

permissions:
  attestations: write
  artifact-metadata: write
  contents: write
  id-token: write
  issues: write

concurrency:
  group: emulebb-nightly
  cancel-in-progress: false

env:
  EMULEBB_NIGHTLY_BASE_VERSION: "0.7.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare nightly metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      release_date: ${{ steps.meta.outputs.release_date }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout app source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute nightly metadata
        id: meta
        env:
          FORCE_NIGHTLY: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          release_date="$(date -u +%Y%m%d)"
          tag="emulebb-nightly-${release_date}-${short_sha}"
          package_version="${EMULEBB_NIGHTLY_BASE_VERSION}-nightly.${release_date}.${short_sha}"

          existing_for_sha="$(git ls-remote --tags origin "refs/tags/emulebb-nightly-*-${short_sha}" | wc -l | tr -d ' ')"
          should_publish="true"
          if [[ "${existing_for_sha}" != "0" && "${FORCE_NIGHTLY}" != "true" ]]; then
            should_publish="false"
          fi

          if [[ "${FORCE_NIGHTLY}" == "true" ]] && git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag="${tag}-run${GITHUB_RUN_NUMBER}"
          fi

          {
            echo "package_version=${package_version}"
            echo "release_date=${release_date}"
            echo "short_sha=${short_sha}"
            echo "should_publish=${should_publish}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build package (${{ matrix.asset_arch }})
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            asset_arch: x64
          - platform: ARM64
            asset_arch: arm64
    uses: emulebb/emulebb-build/.github/workflows/reusable-workspace-command.yml@main
    with:
      app_ref: ${{ github.sha }}
      runs_on: windows-2022
      timeout_minutes: 360
      artifact_name: emulebb-${{ needs.prepare.outputs.package_version }}-${{ matrix.asset_arch }}
      artifact_path: nightly-artifacts/*
      failure_artifact_name: emulebb-nightly-build-logs-${{ matrix.asset_arch }}
      failure_artifact_path: workspaces/workspace/state/build-logs/**
      command: |
        $packageVersion = "${{ needs.prepare.outputs.package_version }}"
        python -m emule_workspace package-release `
          --workspace-root $env:EMULEBB_WORKSPACE_ROOT `
          --config Release `
          --platform "${{ matrix.platform }}" `
          --clean `
          --release-version $packageVersion

        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $releaseRoot = Join-Path $env:EMULEBB_WORKSPACE_ROOT "workspaces\workspace\state\release\emulebb-v$packageVersion"
        $zipPath = Join-Path $releaseRoot "emulebb-$packageVersion-${{ matrix.asset_arch }}.zip"
        if (-not (Test-Path -LiteralPath $zipPath)) {
          throw "Release package not found: $zipPath"
        }

        $expectedBaseNames = @(
          "emulebb-slate",
          "emulebb-graphite",
          "emulebb-midnight",
          "emulebb-steel",
          "emulebb-moss",
          "emulebb-daylight-soft",
          "emulebb-retro-teal",
          "emulebb-phosphor-green"
        )

        $archive = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
        try {
          $entries = @($archive.Entries | ForEach-Object { $_.FullName })
          foreach ($baseName in $expectedBaseNames) {
            foreach ($suffix in @(".eMuleSkin.ini", ".eMuleToolbar.kad02.bmp")) {
              $entryName = "eMuleBB/skins/$baseName$suffix"
              if ($entries -notcontains $entryName) {
                throw "Missing packaged display theme asset: $entryName"
              }
            }
          }

          $retiredTerms = @("classic", "muted", ("bor" + "land"), ("mat" + "rix"))
          $retiredEntries = @($entries | Where-Object {
            $entryName = $_
            ($entryName -like "eMuleBB/skins/*") -and ($retiredTerms | Where-Object { $entryName -match $_ })
          })
          if ($retiredEntries.Count -gt 0) {
            throw "Unexpected retired display theme assets in package: $($retiredEntries -join ', ')"
          }
        } finally {
          $archive.Dispose()
        }

        $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "nightly-artifacts"
        New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
        Copy-Item -Path (Join-Path $releaseRoot "emulebb-$packageVersion-${{ matrix.asset_arch }}.zip") -Destination $artifactRoot
        Copy-Item -Path (Join-Path $releaseRoot "emulebb-$packageVersion-${{ matrix.asset_arch }}.manifest.json") -Destination $artifactRoot
        Copy-Item -Path (Join-Path $releaseRoot "emulebb-$packageVersion-${{ matrix.asset_arch }}.sbom.spdx.json") -Destination $artifactRoot
        Get-ChildItem $artifactRoot

  publish:
    name: Publish nightly release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download package assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
          RELEASE_DATE: ${{ needs.prepare.outputs.release_date }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          cat > notes.md <<EOF
          Automated eMuleBB nightly package from main commit ${GITHUB_SHA}.

          This is a prerelease test build for the 0.7.3 RC stabilization window. Use the official RC and stable release tags for release decisions.

          Package version: ${PACKAGE_VERSION}

          Nightly ZIP, manifest, and SBOM assets are published with GitHub artifact attestations.

          Verify a downloaded nightly asset with:

              gh attestation verify PATH_TO_ASSET -R ${GITHUB_REPOSITORY}
          EOF
          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "eMuleBB nightly ${RELEASE_DATE} (${SHORT_SHA})" \
            --notes-file notes.md \
            --prerelease

      - name: Keep only latest nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_TAG_PREFIX: emulebb-nightly-
        shell: bash
        run: |
          set -euo pipefail
          jq_filter='.[] | select(.isPrerelease and (.tagName | startswith("'"${NIGHTLY_TAG_PREFIX}"'"))) | [.createdAt, .tagName] | @tsv'
          mapfile -t old_tags < <(
            gh release list \
              --repo "${GITHUB_REPOSITORY}" \
              --limit 100 \
              --json tagName,isPrerelease,createdAt \
              --jq "${jq_filter}" |
            sort -r |
            tail -n +2 |
            cut -f2
          )

          if [[ "${#old_tags[@]}" -eq 0 ]]; then
            echo "No older nightly releases to delete."
            exit 0
          fi

          for tag in "${old_tags[@]}"; do
            echo "Deleting old nightly release and tag: ${tag}"
            gh release delete "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --cleanup-tag \
              --yes
          done

  report:
    name: Report nightly status
    needs:
      - prepare
      - build
      - publish
    if: ${{ always() && needs.prepare.result == 'success' && needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Update nightly failure issue
        uses: actions/github-script@v8
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = "[CI] Nightly failure";
            const { owner, repo } = context.repo;
            const issueList = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issueList.data.find((issue) => issue.title === title);
            const buildResult = process.env.BUILD_RESULT;
            const publishResult = process.env.PUBLISH_RESULT;
            const runUrl = process.env.RUN_URL;
            const packageVersion = process.env.PACKAGE_VERSION;
            const tag = process.env.TAG;
            const passed = buildResult === "success" && publishResult === "success";

            if (passed) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Nightly recovered on ${context.sha}.\n\nRun: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  state: "closed",
                });
              }
              return;
            }

            const body = [
              "Nightly failed or did not complete.",
              "",
              `Build result: ${buildResult}`,
              `Publish result: ${publishResult}`,
              `Commit: ${context.sha}`,
              `Package version: ${packageVersion}`,
              `Tag: ${tag}`,
              `Run: ${runUrl}`,
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }
